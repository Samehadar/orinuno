services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orinuno
    ports:
      - "3316:3306"
    volumes:
      - orinuno-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8085:8080"
      - "8086:8081"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: orinuno
      DB_USERNAME: root
      DB_PASSWORD: root
      KODIK_TOKEN: ${KODIK_TOKEN:-}
      KODIK_TOKEN_FILE: /app/data/kodik_tokens.json
      SPRING_PROFILES_ACTIVE: local
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  demo:
    build: ./demo
    depends_on:
      - app
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: ""
      VITE_API_KEY: ""

  # ────────────────────────────────────────────────────────────────────
  # Local observability stack — Prometheus scrapes orinuno's actuator
  # endpoint at app:8081/actuator/prometheus, Grafana ships pre-loaded
  # with the "orinuno — parse requests" dashboard. Both opt-in via the
  # `observability` profile so plain `docker compose up` stays minimal.
  #
  # Run with metrics:
  #   docker compose --profile observability up
  #
  # URLs (after start):
  #   Prometheus → http://localhost:9090
  #   Grafana    → http://localhost:3001  (admin / admin)
  # ────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    profiles: ["observability"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  orinuno-db:
  prometheus-data:
  grafana-data:
