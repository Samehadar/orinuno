version: 2

updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - java
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      spring:
        patterns:
          - "org.springframework*"
          - "io.spring*"
      testing:
        patterns:
          - "org.testcontainers*"
          - "org.junit*"
          - "org.mockito*"
          - "org.assertj*"
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      actions:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: "/demo"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
      - demo
    commit-message:
      prefix: chore
      include: scope
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/demo"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
      - demo
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      vue-ecosystem:
        patterns:
          - "vue*"
          - "@vue/*"
          - "@vitejs/*"
          - "vite"
      npm-prod:
        dependency-type: production
        update-types:
          - minor
          - patch
      npm-dev:
        dependency-type: development
        update-types:
          - minor
          - patch
